name: 'venatus_analytics'
version: '1.0.0'
config-version: 2

vars:
  current_date: "today()"
  current_date_minus_10_days: "subtractDays(today(), 10)"
  event_start_date: '2026-02-10'

profile: 'venatus_analytics'

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

models:
  venatus_analytics:
    staging:
      +materialized: view
      +schema: analytics
    marts:
      +materialized: table
      +schema: analytics
