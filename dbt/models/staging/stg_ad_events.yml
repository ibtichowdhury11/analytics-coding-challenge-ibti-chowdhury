version: 2

models:
  - name: stg_ad_events
    description: >
      This is the cleaned, deduplicated staging table for raw ad events table. 
      It uses a 10 day lookback window to handle late or corrected data.
    columns:  
      - name: event_timestamp
        description: "The raw date and time the event occurred."
        tests:
          - not_null

      - name: event_date
        description: "The date of the event, Primary partition key."

      - name: event_month
        description: "The first day of the month for the event."

      - name: event_id
        description: "Unique identifier for the event. Deduplicated using the most recent _loaded_at."
        tests:
          - unique
          - not_null

      - name: event_type
        description: "The type of event (e.g., impression, click), normalised to lowercase."

      - name: publisher_id
        description: "Identifier for the publisher where the event occurred."

      - name: site_domain
        description: "The domain name of the site where the ad was served."

      - name: ad_unit_id
        description: "Identifier for the specific ad placement."

      - name: campaign_id
        description: "Identifier for the advertising campaign. Values of 0 are converted to NULL."

      - name: advertiser_id
        description: "Identifier for the advertiser. Values of 0 are converted to NULL."

      - name: device_type
        description: "Category of device used (e.g., desktop, mobile)."

      - name: country_code
        description: "ISO country code, normalised to lowercase."

      - name: browser
        description: "The web browser used by the visitor."

      - name: is_filled
        description: "Binary flag (1 or 0) indicating if the request resulted in an ad fill."
        tests:
          - accepted_values:
              arguments: 
                values: [0, 1]

      - name: revenue_usd
        description: "The revenue generated in USD, stored with Decimal64(6) precision."

      - name: bid_floor_usd
        description: "The minimum price required for the bid, stored with Decimal64(6) precision."