version: 2

models:
  - name: fct_ad_events_daily
    description: >
      Daily aggregated ad performance metrics at the grain of publisher, site, ad unit, 
      campaign, advertiser, device, browser, and country.
      This model is incremental and refreshes the last 10 days of data on every run.
    
    columns:
      - name: unique_key
        description: "MD5 hash of the row grain (Date, Publisher, Ad Unit, Site, Device, Browser, Campaign, Advertiser, Country). Primary key for the table."
        tests:
          - unique
          - not_null

      - name: date
        description: "The  date of the events."
        tests:
          - not_null

      - name: month
        description: "The first day of the month for the event date, used for monthly trend analysis."

      - name: publisher_name
        description: "The display name of the publisher (joined from raw_publishers)."

      - name: publisher_category
        description: "The business category assigned to the publisher."

      - name: site_domain
        description: "The domain where the ad was served."

      - name: ad_unit_id
        description: "The unique identifier for the specific ad placement."

      - name: campaign_id
        description: "The unique identifier for the advertising campaign."

      - name: advertiser_id
        description: "The unique identifier for the advertiser."

      - name: device_type
        description: "The type of device (mobile, desktop, etc)."

      - name: browser
        description: "The web browser used by the user."

      - name: country_code
        description: "The ISO 2-letter country code."

      # --- METRICS  Semantic Layer

      - name: total_revenue_usd
        description: "Total revenue generated in USD."
        meta:
          metrics:
            sum_revenue:
              type: sum
              label: "Total Revenue ($)"
              round: 2

      - name: impressions
        description: "Total number of tracked ad impressions."
        meta:
          metrics:
            sum_impressions:
              type: sum
              label: "Total Impressions"

      - name: viewable impressions
        description: "Total number of tracked ad impressions."
        meta:
          metrics:
            sum_viewable_impressions:
              type: sum
              label: "Total Viewable Impressions"

      - name: total_ad_requests
        description: "Total number of ad requests initiated."
        meta:
          metrics:
            sum_ad_requests:
              type: sum
              label: "Total Ad Requests"

      - name: total_filled_impressions
        description: "Sum of successfully filled ad slots."
        meta:
          metrics:
            sum_filled_impressions:
              type: sum
              label: "Total Filled Impressions"

      - name: fill_rate
        description: "Ratio of filled impressions to total requests."
        meta:
          metrics:
            fill_rate:
              type: number
              label: "True Fill Rate (%)"
              sql: "CAST(SUM(${total_filled_impressions}) AS Float64) / NULLIF(SUM(${ad_requests}), 0)"
              format: "percent"

      - name: clicks
        description: "Total number of user clicks."
        meta:
          metrics:
            sum_clicks:
              type: sum
              label: "Total Clicks"
      
        -name: ad_requests
        description: "Total number of ad requests."
        meta:
          metrics:
            sum_clicks:
              type: sum
              label: "Total Ad requests"